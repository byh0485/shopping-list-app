<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
      background: #f4f5f7;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
      color: #1a1a2e;
    }
    .app {
      background: #fff;
      width: 100%;
      max-width: 440px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      padding: 28px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subtitle {
      color: #8a8a9e;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    #itemInput {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #e0e0e8;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }
    #itemInput:focus { border-color: #6c5ce7; }
    #addBtn {
      background: #6c5ce7;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    #addBtn:hover { background: #5a4bd1; }
    ul { list-style: none; }
    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px;
      border-bottom: 1px solid #f0f0f5;
      animation: fadeIn .2s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
    li .check {
      width: 22px;
      height: 22px;
      border: 2px solid #cfcfe0;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    li.done .check {
      background: #6c5ce7;
      border-color: #6c5ce7;
    }
    li.done .check::after {
      content: "✓";
      color: #fff;
      font-size: 14px;
    }
    li .text {
      flex: 1;
      font-size: 15px;
      word-break: break-all;
    }
    li.done .text {
      text-decoration: line-through;
      color: #b0b0c0;
    }
    li .del {
      background: none;
      border: none;
      color: #cfcfe0;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color .15s;
    }
    li .del:hover { color: #e74c3c; }
    .empty {
      text-align: center;
      color: #b0b0c0;
      padding: 30px 0;
      font-size: 14px;
    }
    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #8a8a9e;
    }
    #clearDone {
      background: none;
      border: none;
      color: #8a8a9e;
      cursor: pointer;
      font-size: 13px;
      text-decoration: underline;
    }
    #clearDone:hover { color: #e74c3c; }

    /* ---- 인증(로그인/회원가입) ---- */
    .hidden { display: none !important; }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }
    .auth-form input {
      padding: 12px 14px;
      border: 1px solid #e0e0e8;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }
    .auth-form input:focus { border-color: #6c5ce7; }
    .auth-buttons { display: flex; gap: 8px; }
    .auth-buttons button {
      flex: 1;
      border-radius: 10px;
      padding: 12px 0;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    #loginBtn {
      background: #6c5ce7;
      color: #fff;
      border: none;
    }
    #loginBtn:hover { background: #5a4bd1; }
    #signupBtn {
      background: #fff;
      color: #6c5ce7;
      border: 1px solid #6c5ce7;
    }
    #signupBtn:hover { background: #f2f0ff; }
    .auth-msg {
      font-size: 13px;
      min-height: 18px;
      color: #8a8a9e;
    }
    .auth-msg.error { color: #e74c3c; }
    .auth-msg.ok { color: #2ecc71; }
    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-size: 13px;
      color: #8a8a9e;
    }
    #userEmail { font-weight: 600; color: #6c5ce7; word-break: break-all; }
    #logoutBtn {
      background: none;
      border: none;
      color: #8a8a9e;
      cursor: pointer;
      font-size: 13px;
      text-decoration: underline;
      flex-shrink: 0;
      margin-left: 12px;
    }
    #logoutBtn:hover { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑리스트</h1>

    <!-- 로그인/회원가입 화면 -->
    <div id="authView">
      <p class="subtitle">로그인하면 내 쇼핑리스트가 저장돼요</p>
      <div class="auth-form">
        <input type="email" id="emailInput" placeholder="이메일" autocomplete="username">
        <input type="password" id="passwordInput" placeholder="비밀번호 (6자 이상)" autocomplete="current-password">
        <div class="auth-buttons">
          <button id="loginBtn">로그인</button>
          <button id="signupBtn">회원가입</button>
        </div>
        <p class="auth-msg" id="authMsg"></p>
      </div>
    </div>

    <!-- 쇼핑리스트 화면 (로그인 후 표시) -->
    <div id="appView" class="hidden">
      <div class="user-bar">
        <span><span id="userEmail"></span> 님</span>
        <button id="logoutBtn">로그아웃</button>
      </div>

      <div class="input-row">
        <input type="text" id="itemInput" placeholder="예: 우유, 계란, 사과..." maxlength="60" autocomplete="off">
        <button id="addBtn">추가</button>
      </div>

      <ul id="list"></ul>

      <div class="footer">
        <span id="count">0개 항목</span>
        <button id="clearDone">완료 항목 지우기</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // Supabase 연결 정보.
    // publishable 키는 브라우저에 노출되도록 설계된 공개 클라이언트 키이며,
    // 실제 데이터 접근은 서버 측 RLS(Row Level Security) 정책이 통제한다.
    const SUPABASE_URL = "https://efplhfpkksjnzmlghvby.supabase.co";
    const SUPABASE_KEY = "sb_publishable_BHZgfaj7TuDWPh2Qb40eeg_nWm3D4GI";
    const TABLE = "shopping_items";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    const listEl = document.getElementById("list");
    const inputEl = document.getElementById("itemInput");
    const addBtn = document.getElementById("addBtn");
    const countEl = document.getElementById("count");
    const clearDoneBtn = document.getElementById("clearDone");

    // 인증 관련 요소
    const authView = document.getElementById("authView");
    const appView = document.getElementById("appView");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");
    const authMsg = document.getElementById("authMsg");
    const logoutBtn = document.getElementById("logoutBtn");
    const userEmailEl = document.getElementById("userEmail");

    async function load() {
      const { data, error } = await supabase
        .from(TABLE)
        .select("id, name, done")
        .order("created_at", { ascending: true });
      if (error) {
        console.error("항목을 불러오지 못했습니다:", error.message);
        return;
      }
      items = data;
      render();
    }

    function render() {
      listEl.innerHTML = "";

      if (items.length === 0) {
        listEl.innerHTML = '<li class="empty">아직 항목이 없습니다. 위에서 추가해 보세요!</li>';
      } else {
        items.forEach((item) => {
          const li = document.createElement("li");
          if (item.done) li.classList.add("done");

          const check = document.createElement("div");
          check.className = "check";
          check.title = "체크";
          check.addEventListener("click", () => toggle(item.id));

          const text = document.createElement("span");
          text.className = "text";
          text.textContent = item.name;

          const del = document.createElement("button");
          del.className = "del";
          del.textContent = "×";
          del.title = "삭제";
          del.addEventListener("click", () => remove(item.id));

          li.append(check, text, del);
          listEl.appendChild(li);
        });
      }

      const remaining = items.filter(i => !i.done).length;
      countEl.textContent = `${items.length}개 항목 · 남은 것 ${remaining}개`;
    }

    async function add() {
      const name = inputEl.value.trim();
      if (!name) return;
      inputEl.value = "";
      inputEl.focus();

      const { data, error } = await supabase
        .from(TABLE)
        .insert({ name, done: false })
        .select("id, name, done")
        .single();
      if (error) {
        console.error("항목을 추가하지 못했습니다:", error.message);
        return;
      }
      items.push(data);
      render();
    }

    async function toggle(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const newDone = !item.done;

      const { error } = await supabase
        .from(TABLE)
        .update({ done: newDone })
        .eq("id", id);
      if (error) {
        console.error("항목을 수정하지 못했습니다:", error.message);
        return;
      }
      item.done = newDone;
      render();
    }

    async function remove(id) {
      const { error } = await supabase
        .from(TABLE)
        .delete()
        .eq("id", id);
      if (error) {
        console.error("항목을 삭제하지 못했습니다:", error.message);
        return;
      }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDone() {
      const { error } = await supabase
        .from(TABLE)
        .delete()
        .eq("done", true);
      if (error) {
        console.error("완료 항목을 지우지 못했습니다:", error.message);
        return;
      }
      items = items.filter(i => !i.done);
      render();
    }

    // ---------- 인증 ----------
    function setAuthMsg(text, kind = "") {
      authMsg.textContent = text;
      authMsg.className = "auth-msg" + (kind ? " " + kind : "");
    }

    function setBusy(busy) {
      loginBtn.disabled = busy;
      signupBtn.disabled = busy;
    }

    async function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) {
        setAuthMsg("이메일과 비밀번호를 입력하세요.", "error");
        return;
      }
      setBusy(true);
      setAuthMsg("로그인 중...");
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      setBusy(false);
      if (error) {
        setAuthMsg("로그인 실패: " + error.message, "error");
        return;
      }
      setAuthMsg("");
      // 세션 반영은 onAuthStateChange가 처리한다.
    }

    async function signup() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) {
        setAuthMsg("이메일과 비밀번호를 입력하세요.", "error");
        return;
      }
      setBusy(true);
      setAuthMsg("가입 중...");
      const { data, error } = await supabase.auth.signUp({ email, password });
      setBusy(false);
      if (error) {
        setAuthMsg("회원가입 실패: " + error.message, "error");
        return;
      }
      // 이메일 확인이 켜져 있으면 세션 없이 사용자만 생성된다.
      if (!data.session) {
        setAuthMsg("확인 메일을 보냈습니다. 메일의 링크를 눌러 인증한 뒤 로그인하세요.", "ok");
        return;
      }
      setAuthMsg("");
      // 세션이 바로 발급된 경우 onAuthStateChange가 화면을 전환한다.
    }

    async function logout() {
      await supabase.auth.signOut();
      // 화면 전환은 onAuthStateChange가 처리한다.
    }

    // 로그인/로그아웃 상태에 따라 화면을 전환한다.
    // getSession()과 onAuthStateChange(INITIAL_SESSION)가 모두 호출될 수 있으므로,
    // 같은 사용자에 대한 중복 처리는 건너뛴다.
    let currentUserId = null;
    async function applySession(session) {
      const nextUserId = session?.user?.id ?? null;
      if (nextUserId === currentUserId) return;
      currentUserId = nextUserId;

      if (session) {
        userEmailEl.textContent = session.user.email;
        authView.classList.add("hidden");
        appView.classList.remove("hidden");
        emailInput.value = "";
        passwordInput.value = "";
        await load();
      } else {
        appView.classList.add("hidden");
        authView.classList.remove("hidden");
        items = [];
        listEl.innerHTML = "";
      }
    }

    // ---------- 이벤트 바인딩 ----------
    addBtn.addEventListener("click", add);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") add();
    });
    clearDoneBtn.addEventListener("click", clearDone);

    loginBtn.addEventListener("click", login);
    signupBtn.addEventListener("click", signup);
    logoutBtn.addEventListener("click", logout);
    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    // 로그인 상태 변화(로그인/로그아웃/토큰갱신)를 구독한다.
    supabase.auth.onAuthStateChange((_event, session) => {
      applySession(session);
    });

    // 초기 세션 확인 (새로고침 후에도 로그인 유지)
    const { data: { session } } = await supabase.auth.getSession();
    await applySession(session);
  </script>
</body>
</html>
